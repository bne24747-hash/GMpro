name: Compile GMpro Standalone OLED Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 Core
        run: |
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Required Libraries
        run: |
          # Library untuk OLED dan GFX
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit BusIO"
          
          # Cek list library
          arduino-cli lib list

      - name: Compile GMpro Firmware
        run: |
          # Membuat folder output
          mkdir -p ./build
          
          # Compile menggunakan FQBN generic ESP8266 
          # Karena kode ini standalone (bukan SDK Spacehuhn)
          arduino-cli compile \
            --fqbn esp8266:esp8266:generic:xtal=80,vt=flash,exception=disabled,stacksmash=disabled,ssl=all,mmu=32,non32xfer=fast,eesz=4M2M,led=2,ip=lm2f,dbg=Disabled,lvl=None,wipe=none,baud=115200 \
            ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-OLED-64x48-Binary
          path: ./build/*.bin
