name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install SDK & Libraries
        run: |
          # 1. Setup Index SDK Spacehuhn
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          
          # 2. Install Core ESP8266 (Versi Deauther)
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          
          # 3. INSTALL PELURU (Library yang bikin error tadi)
          # Kita ambil langsung dari GitHub me-no-dev karena ini library paling stabil buat ESPAsync
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson" # Versi terbaru biasanya aman, atau pake v5 kalau perlu
          
          # 4. Install Library Async (Manual git clone karena sering ga ada di manager)
          mkdir -p /home/runner/Arduino/libraries
          git clone https://github.com/me-no-dev/ESPAsyncTCP.git /home/runner/Arduino/libraries/ESPAsyncTCP
          git clone https://github.com/me-no-dev/ESPAsyncWebServer.git /home/runner/Arduino/libraries/ESPAsyncWebServer

      - name: Install Local Library Zip
        run: |
          # Jaga-jaga kalau lo tetep mau pake zip dari repo lo
          if [ -f ArduinoJson-5.13.5.zip ]; then
            unzip -o ArduinoJson-5.13.5.zip -d /home/runner/Arduino/libraries/
          fi

      - name: Compile GMpro Firmware
        run: |
          # Compile pake FQBN pilihan lo, dengan library path yang bener
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          --libraries /home/runner/Arduino/libraries \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Deauther-Binary
          path: ./build/*.bin
