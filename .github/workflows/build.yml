name: Compile GMpro Standalone OLED Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 Core
        run: |
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Required Libraries
        run: |
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit BusIO"

      - name: Compile GMpro Firmware
        run: |
          mkdir -p ./build
          # FQBN diringkas supaya tidak error di bagian debug level (lvl)
          # eesz=4M2M tetap dipakai untuk space filesystem yang lega
          arduino-cli compile \
            --fqbn esp8266:esp8266:generic:eesz=4M2M \
            ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-OLED-Fixed-Binary
          path: ./build/*.bin
