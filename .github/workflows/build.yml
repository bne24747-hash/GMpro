name: Compile GMpro Deauther

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          # SDK ini wajib agar fungsi Deauth bekerja
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries
        run: |
          # Library inti untuk Deauther
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson@5.13.5"

      - name: Compile GMpro Firmware
        run: |
          # FQBN diringkas agar tidak error 'invalid option mmu'
          # eesz=4M2M diset agar Web UI bisa menyimpan target (SSID GMpro2)
          arduino-cli compile --fqbn deauther:esp8266:generic:xtal=80,vtables=flash,eesz=4M2M \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Deauther-Working
          path: ./build/*.bin
