name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries
        run: |
          # Install SimpleCLI otomatis dari server
          arduino-cli lib install "SimpleCLI"
          
          # Install ArduinoJson versi 5 (WAJIB v5 untuk code lu)
          # Ini cara paling aman daripada unzip manual
          arduino-cli lib install "ArduinoJson@5.13.5"

      - name: Compile GMpro Firmware
        run: |
          # Pastikan nama file .ino di repo lu adalah GMpro.ino
          # Jika namanya masih WifiXv1.3.ino, ganti teks di bawah ini:
          arduino-cli compile --fqbn deauther:esp8266:generic \
          --libraries /home/runner/Arduino/libraries \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Deauther-Binary
          path: ./build/*.bin
