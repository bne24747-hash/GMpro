name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Prepare Libraries
        run: |
          # Buat folder library standard Arduino CLI
          mkdir -p $HOME/Arduino/libraries
          
          # Install SimpleCLI (Dependencies standard)
          arduino-cli lib install "SimpleCLI"
          
          # Unzip ArduinoJson 5.13.5 yang ada di repo ke folder libraries
          # Pastikan file zip ini ada di root repository lo
          if [ -f "ArduinoJson-5.13.5.zip" ]; then
            unzip -o ArduinoJson-5.13.5.zip -d $HOME/Arduino/libraries/
          else
            echo "Error: ArduinoJson-5.13.5.zip tidak ditemukan di root repo!"
            exit 1
          fi
          
          # Cek isi folder untuk memastikan struktur benar
          ls -R $HOME/Arduino/libraries/

      - name: Compile GMpro Firmware
        run: |
          # FQBN: deauther:esp8266:generic (Flash 4MB, FS 2MB)
          # Kita tambahkan --library flag agar CLI pasti baca folder manual kita
          arduino-cli compile \
            --fqbn deauther:esp8266:generic:eesz=4M2M \
            --libraries $HOME/Arduino/libraries \
            ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-v16-Binary
          path: ./build/*.bin
