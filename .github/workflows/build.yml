name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries
        run: |
          # Install SimpleCLI (Wajib untuk Deauther SDK)
          arduino-cli lib install "SimpleCLI"
          
          # Install ArduinoJson versi 5.13.5 langsung dari server (Tanpa ZIP)
          # Versi 5.x wajib karena versi 6.x ke atas bakal bikin error di SDK lama
          arduino-cli lib install "ArduinoJson"@5.13.5
          
          # Cek list library untuk memastikan semua terpasang
          arduino-cli lib list

      - name: Compile GMpro Firmware
        run: |
          # Membuat folder output
          mkdir -p ./build
          
          # Compile menggunakan FQBN standard Deauther
          # eesz=4M2M memberikan space 2MB untuk sistem file phishing
          arduino-cli compile \
            --fqbn deauther:esp8266:generic:eesz=4M2M \
            ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-v16-Binary
          path: ./build/*.bin
