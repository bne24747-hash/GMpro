name: Build GMpro87 Firmware

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          git clone https://github.com/me-no-dev/ESPAsyncWebServer.git /home/runner/Arduino/libraries/ESPAsyncWebServer
          git clone https://github.com/me-no-dev/AsyncTCP.git /home/runner/Arduino/libraries/AsyncTCP

      - name: Compile Firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir ./build GMpro87_Full.ino

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # Perbaikan utama di sini
        with:
          name: GMpro87-Binaries
          path: ./build
