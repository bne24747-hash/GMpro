name: Compile GMpro Ultimate V5.1

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 Core
        run: |
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Compile GMpro Firmware
        run: |
          # Bikin folder build dulu biar rapi
          mkdir -p build
          # Compile dengan alokasi FS 2MB untuk LittleFS
          arduino-cli compile --fqbn esp8266:esp8266:generic:eesz=4M2M,vt=flash \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Ultimate-V5-Binary
          path: ./build/*.bin
