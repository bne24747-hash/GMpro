name: Compile GMpro Deauther Fixed Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2 # Versi v2 lebih stabil

      - name: Install Spacehuhn Deauther SDK
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Libraries
        run: |
          # Install library yang dibutuhin OLED
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit BusIO" # WAJIB ada buat Adafruit library terbaru
          
          # Jika lu punya ArduinoJson zip di repo, pindahin ke folder libraries internal cli
          LIB_PATH=$(arduino-cli config dump | grep directories.user | cut -d ' ' -f 2)/libraries
          mkdir -p $LIB_PATH
          
          if [ -f "ArduinoJson-5.13.5.zip" ]; then
            unzip -o ArduinoJson-5.13.5.zip -d $LIB_PATH/
          else
            # Kalau zip gak ada di repo, install manual versi 5 (karena kode lu pake versi 5)
            arduino-cli lib install "ArduinoJson"@5.13.5
          fi

      - name: Compile GMpro Firmware
        run: |
          # Pastikan nama file .ino lu adalah GMpro.ino
          arduino-cli compile --fqbn deauther:esp8266:generic:eesz=4M2M \
          --libraries $(arduino-cli config dump | grep directories.user | cut -d ' ' -f 2)/libraries \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Deauther-Binary
          path: ./build/*.bin
