name: Compile GMpro Force Deauth
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP8266 SDK
        run: |
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266@2.7.4 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson"@5.13.5
          mkdir -p /home/runner/Arduino/libraries/ArduinoJson/src/
          echo '#include "ArduinoJson.h"' > /home/runner/Arduino/libraries/ArduinoJson/src/ArduinoJson.5.13.h

      - name: Compile GMpro
        run: |
          # Perhatikan bagian --build-property, ini buat maksa SDK buka ijin kirim paket mentah
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 \
          --build-property "compiler.cpp.extra_flags=-DEXTERNAL_WIFI_PACKET_FREEDOM" \
          GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Force-Deauth
          path: ./build/*.bin
