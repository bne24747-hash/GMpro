name: Compile SDK 2.0.0 Legacy
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install SDK 2.0.0
        run: |
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266@2.0.0 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Library
        run: |
          mkdir -p /home/runner/Arduino/libraries
          arduino-cli lib install "SimpleCLI"
          unzip -o ArduinoJson-5.13.5.zip -d /home/runner/Arduino/libraries/

      - name: Compile GMpro
        run: |
          # SDK 2.0.0 gak butuh flag macem-macem, dia udah 'telanjang' dari sananya
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 \
          --build-property "build.flash_mode=dout" \
          GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-200-LEGACY
          path: ./build/*.bin
