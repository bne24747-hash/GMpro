name: Compile GMpro Fix Deauth
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Deauther Core
        run: |
          # Menggunakan URL Board Manager khusus Deauther agar fungsi paket bebas aktif
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino-esp8266-deauther/master/package_esp8266_deauther_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino-esp8266-deauther/master/package_esp8266_deauther_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson"@5.13.5
          echo '#include "ArduinoJson.h"' > /home/runner/Arduino/libraries/ArduinoJson/src/ArduinoJson.5.13.h

      - name: Compile Project
        run: |
          # Menggunakan board 'deauther' yang sudah di-patch agar deauth lancar
          arduino-cli compile --fqbn deauther:esp8266:nodemcuv2 GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Real-Deauth-Binary
          path: ./build/*.bin
