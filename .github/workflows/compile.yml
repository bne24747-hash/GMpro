name: Compile GMpro Deauther No-OLED

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Spacehuhn Deauther Core
        run: |
          # Menggunakan SDK khusus agar fitur Deauth/Packet Injection aktif
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino/main/package_spacehuhn_index.json

      - name: Install Essential Libraries
        run: |
          # Hanya install library inti tanpa library display/OLED
          arduino-cli lib install "SimpleCLI"
          arduino-cli lib install "ArduinoJson@5.13.5"

      - name: Compile GMpro Firmware
        run: |
          # Compile tanpa fitur display
          # Menggunakan FQBN Deauther Core agar serangan ke SSID GMpro2 berfungsi
          arduino-cli compile --fqbn deauther:esp8266:generic:xtal=80,vtables=flash,exception=disabled,stacksmash=disabled,ssl=all,mmu=32,non32xfer=fast,eesz=4M2M,ip=lm2f,dbg=Disabled,lvl=None__,wipe=none,baud=115200 \
          ./GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-NoOLED-Binary
          path: ./build/*.bin
