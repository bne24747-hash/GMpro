name: Compile GMpro Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install SDK
        run: |
          # Pake link stabil dan langsung install versinya
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266@2.7.4 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Prepare Local Library
        run: |
          mkdir -p /home/runner/Arduino/libraries
          arduino-cli lib install "SimpleCLI"
          # Ekstrak library modifikasi sesuai instruksi resmi
          unzip -o ArduinoJson-5.13.5.zip -d /home/runner/Arduino/libraries/
          LIB_SRC=$(find /home/runner/Arduino/libraries/ -name "src" -type d | head -n 1)
          echo '#include "ArduinoJson.h"' > "$LIB_SRC/ArduinoJson.5.13.h"

      - name: Compile GMpro
        run: |
          # Pake board nodemcuv2 tapi dengan flag 'Freedom' biar bisa deauth
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 \
          --build-property "compiler.cpp.extra_flags=-DEXTERNAL_WIFI_PACKET_FREEDOM" \
          GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Success-Bin
          path: ./build/*.bin
