name: Compile GMpro Official SDK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Deauther Core
        run: |
          # SESUAI INSTRUKSI: Pake URL board manager khusus deauther
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino-esp8266-deauther/master/package_esp8266_deauther_index.json
          arduino-cli core install deauther:esp8266 --additional-urls https://raw.githubusercontent.com/SpacehuhnTech/arduino-esp8266-deauther/master/package_esp8266_deauther_index.json

      - name: Prepare Modified Library
        run: |
          mkdir -p /home/runner/Arduino/libraries
          arduino-cli lib install "SimpleCLI"
          # Pakai library MODIFIKASI dari zip lu (sesuai poin 3 di gambar)
          unzip -o ArduinoJson-5.13.5.zip -d /home/runner/Arduino/libraries/
          LIB_SRC=$(find /home/runner/Arduino/libraries/ -name "src" -type d | head -n 1)
          echo '#include "ArduinoJson.h"' > "$LIB_SRC/ArduinoJson.5.13.h"

      - name: Compile GMpro
        run: |
          # SESUAI POIN 4: Pakai FQBN deauther:esp8266:nodemcu
          arduino-cli compile --fqbn deauther:esp8266:nodemcu GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Official-SDK-Binary
          path: ./build/*.bin
