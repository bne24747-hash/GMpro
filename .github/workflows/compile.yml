name: Compile GMpro Ultimate Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP8266 SDK
        run: |
          # Pake link resmi yang udah pasti jalan (bukan yang 404)
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266@2.7.4

      - name: Prepare Local Library
        run: |
          mkdir -p /home/runner/Arduino/libraries
          arduino-cli lib install "SimpleCLI"
          # Ekstrak library modifikasi dari zip lu (Penting sesuai instruksi resminya)
          unzip -o ArduinoJson-5.13.5.zip -d /home/runner/Arduino/libraries/
          LIB_SRC=$(find /home/runner/Arduino/libraries/ -name "src" -type d | head -n 1)
          echo '#include "ArduinoJson.h"' > "$LIB_SRC/ArduinoJson.5.13.h"

      - name: Compile GMpro
        run: |
          # KUNCINYA: Kita pake board generic supaya settingan wifi_send_pkt_freedom kebuka semua
          arduino-cli compile --fqbn esp8266:esp8266:generic \
          --build-property "compiler.cpp.extra_flags=-DEXTERNAL_WIFI_PACKET_FREEDOM" \
          --build-property "build.lwip_variant=v2_lower" \
          GMpro.ino --output-dir ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: GMpro-Real-Fix
          path: ./build/*.bin
