<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GMpro87 Admin</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; }
        .header { font-size: 28px; text-align: center; padding: 20px; border-bottom: 2px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        
        /* Stats Bar */
        .stats-bar { background: #111; display: flex; justify-content: space-around; padding: 10px; font-size: 11px; border-bottom: 1px solid #333; }
        .stats-bar b { color: #fff; }

        /* Tabs */
        .tab-bar { display: flex; background: #0a0a0a; border-bottom: 1px solid #00ff41; }
        .tab-btn { flex: 1; padding: 15px; cursor: pointer; border: none; background: none; color: #00ff41; font-family: inherit; }
        .tab-btn.active { background: #00ff41; color: #000; font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .active-content { display: block; }

        /* Control Panel */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 12px; cursor: pointer; }
        button:hover { background: #00ff41; color: #000; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; background: #111; border: 1px solid #444; color: #fff; }
        
        .log-box { background: #050505; border: 1px solid #f00; height: 120px; overflow-y: scroll; padding: 10px; font-size: 12px; color: #f00; text-align: left; }
    </style>
</head>
<body>
    <div class="header">GMpro87</div>

    <div class="stats-bar">
        <span>SSID: <b id="st_ssid">---</b></span>
        <span>CH: <b id="st_ch">0</b></span>
        <span>RSSI: <b id="st_rssi">0%</b></span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="openTab(event, 'main')">ATTACK</button>
        <button class="tab-btn" onclick="openTab(event, 'config')">SETTING</button>
        <button class="tab-btn" onclick="openTab(event, 'data')">FILES/LOG</button>
    </div>

    <div id="main" class="tab-content active-content">
        <div class="grid">
            <button onclick="api('/scan')">SCAN WIFI</button>
            <button onclick="api('/deauth')">DEAUTH</button>
            <button onclick="api('/beacon')">BEACON SPAM</button>
            <button onclick="api('/etwin')">EVIL TWIN</button>
        </div>
        <label>TARGET SELECT:</label>
        <select id="targets"><option>-- No Target --</option></select>
    </div>

    <div id="config" class="tab-content">
        <label>Admin SSID:</label>
        <input type="text" id="a_ssid" value="GMpro">
        <label>Admin Pass:</label>
        <input type="text" id="a_pass" value="Sangkur87">
        <label>Beacon Count:</label>
        <input type="number" id="b_count" value="15">
        <button style="width:100%" onclick="save()">SAVE SETTINGS</button>
    </div>

    <div id="data" class="tab-content">
        <label>Upload Jebakan (etwin1-5.html):</label>
        <input type="file" id="f_up">
        <button style="width:100%" onclick="upload()">UPLOAD FILE</button>
        
        <h4 style="color:red; margin-top:20px;">PASSWORD LOG:</h4>
        <div class="log-box" id="logs">Waiting for targets...</div>
        <button onclick="api('/clear-log')" style="margin-top:10px; border-color:red; color:red;">CLEAR LOG</button>
    </div>

    <script>
        function openTab(e, n){
            var i,c,b;
            c=document.getElementsByClassName("tab-content");for(i=0;i<c.length;i++)c[i].style.display="none";
            b=document.getElementsByClassName("tab-btn");for(i=0;i<b.length;i++)b[i].className=b[i].className.replace(" active","");
            document.getElementById(n).style.display="block"; e.currentTarget.className+=" active";
        }
        function api(p){ fetch(p).then(r=>r.text()).then(t=>alert(t)); }
        function upload(){
            let f = document.getElementById('f_up').files[0];
            let d = new FormData(); d.append('file', f);
            fetch('/upload', {method:'POST', body:d}).then(()=>alert('Upload Success'));
        }
    </script>
</body>
</html>
